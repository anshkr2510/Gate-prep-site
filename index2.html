<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MIC on Mithila – GATE Schedule Generator</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
padding:20px;
text-align:center;
background:rgba(0,0,0,.25);
}

header h1{
margin:0;
}

.hero{
text-align:center;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:14px;
margin-top:25px;
}

input{
padding:12px;
border:none;
border-radius:8px;
margin:10px;
}

button{
padding:14px 25px;
border:none;
border-radius:10px;
background:#6ea8fe;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4d8df5;
}

.week{
margin-top:20px;
padding:20px;
border-radius:12px;
background:rgba(255,255,255,.06);
}

footer{
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>MIC on Mithila – GATE Schedule Planner</h1>
<p>Civil Engineering Preparation Planner</p>

</header>

<section class="hero">

<h2>Create Your Personal GATE Study Plan</h2>

<label>Start Date:</label>
<input type="date" id="start">

<label>End Date:</label>
<input type="date" id="end">

<br><br>

<button onclick="generatePlan()">Generate Study Plan</button>

</section>

<div class="container">

<div id="output"></div>

</div>

<footer>

© 2026 MIC on Mithila – GATE Academy

</footer>

<script>

const subjects=[

"Engineering Mathematics",
"Strength of Materials",
"Structural Analysis",
"Geotechnical Engineering",
"Fluid Mechanics",
"Environmental Engineering",
"Transportation Engineering",
"RCC",
"Steel Structures",
"General Aptitude"

]

function generatePlan(){

let start=document.getElementById("start").value
let end=document.getElementById("end").value

if(!start || !end){

alert("Please select both dates")

return

}

let output=document.getElementById("output")

output.innerHTML=""

let startDate=new Date(start)
let endDate=new Date(end)

let weeks=Math.ceil((endDate-startDate)/(1000*60*60*24*7))

for(let i=1;i<=weeks;i++){

let subject=subjects[(i-1)%subjects.length]

output.innerHTML+=`

<div class="week">

<h3>Week ${i}</h3>

<p>Subject: ${subject}</p>

<p>✔ Watch Lectures</p>

<p>✔ Solve PYQs</p>

<p>✔ Attempt Topic Test</p>

<label>

<input type="checkbox">

Mark Week Complete

</label>

</div>

`

}

}

</script>

</body>

</html>
